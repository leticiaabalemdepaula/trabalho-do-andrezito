<script src="jdk.js"></script>

<script>

const saida = document.getElementById("saida");

const logOriginal = console.log;

console.log = function(...mensagens){

    logOriginal(...mensagens);

    saida.innerHTML += mensagens.join(" ") + "<br>";

    saida.scrollTop = saida.scrollHeight;

}

let classeEscolhida = "";

function selecionarClasse(classe, elemento){

    classeEscolhida = classe;

    document.querySelectorAll(".classe").forEach(c=>{

        c.classList.remove("selecionada");

    });

    elemento.classList.add("selecionada");

}

document.getElementById("iniciar").addEventListener("click",function(){

    const nome=document.getElementById("nome").value.trim();

    if(nome==""){

        alert("Digite o nome do personagem.");

        return;

    }

    if(classeEscolhida==""){

        alert("Escolha uma classe.");

        return;

    }

    let jogador;

    if(classeEscolhida=="Guerreiro"){

        jogador=new Guerreiro(nome);

    }

    else if(classeEscolhida=="Mago"){

        jogador=new Mago(nome);

    }

    else{

        jogador=new Arqueiro(nome);

    }

    const espada=new Arma("Espada de Ferro",8,50);

    jogador.adicionarArma(espada);

    jogador.equiparArma(espada);

    document.getElementById("menu").style.display="none";

    document.getElementById("jogo").style.display="flex";

    document.getElementById("botoesJogo").style.display="block";

    fase1(jogador);

});

</script>
